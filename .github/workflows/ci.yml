name: Build C++ Module (vcpkg)

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      BUILD_DIR: ${{ github.workspace }}/cpp/build
      VCPKG_DIR: ${{ github.workspace }}/vcpkg
      VCPKG_TRIPLET: x64-linux

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Show Python info (debug)
        run: |
          python -V
          which python
          python -c "import sys, sysconfig; print('prefix=', sys.prefix); print('platlib=', sysconfig.get_paths().get('platlib'))"
          pip --version

      - name: Install system packages (build tools, deps)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential cmake ninja-build pkg-config git wget unzip \
            python3 python3-dev python3-pip python3-numpy python3-venv \
            libopenblas-dev liblapack-dev \
            autoconf autoconf-archive automake libtool

      - name: Install pip basics (pybind11 via pip helps CMake detection)
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install pybind11 numpy

      - name: Install vcpkg (manual bootstrap)
        run: |
          git clone --depth 1 https://github.com/microsoft/vcpkg.git "${VCPKG_DIR}"
          cd "${VCPKG_DIR}"
          ./bootstrap-vcpkg.sh

      - name: Install vcpkg dependencies (manifest mode)
        run: |
          if [ -f "${{ github.workspace }}/vcpkg.json" ]; then
            pushd "${{ github.workspace }}"
          elif [ -f "${{ github.workspace }}/cpp/vcpkg.json" ]; then
            pushd "${{ github.workspace }}/cpp"
          else
            echo "No vcpkg.json found — skipping"
            exit 0
          fi
          "${VCPKG_DIR}/vcpkg" install --triplet ${VCPKG_TRIPLET}
          popd

      - name: Show vcpkg top-level (debug)
        run: |
          echo "VCPKG_DIR=${{ env.VCPKG_DIR }}"
          ls -la ${{ env.VCPKG_DIR }} || echo "vcpkg dir missing"
          echo "Toolchain: ${{ env.VCPKG_DIR }}/scripts/buildsystems/vcpkg.cmake"
          file ${{ env.VCPKG_DIR }}/scripts/buildsystems/vcpkg.cmake || true

      - name: Prepare build dir
        run: |
          mkdir -p "${BUILD_DIR}"
          ls -la cpp || echo "Warning: 'cpp' directory not found"

      - name: Configure CMake (use vcpkg toolchain)
        run: |
          set -euo pipefail

          # Use the same python3 binary used in this runner
          PY=$(python3 -c "import sys; print(sys.executable)")
          echo "Python executable: $PY"

          # Python include (headers)
          PY_INC=$(python3 -c "import sysconfig; print(sysconfig.get_paths()['include'])")
          echo "Python include dir: $PY_INC"
          ls -la "$PY_INC" || true

          # NumPy include dir (C headers)
          PY_NUMPY_INC=$(python3 -c "import numpy as np; import os; print(np.get_include())")
          echo "NumPy include dir: $PY_NUMPY_INC"
          ls -la "$PY_NUMPY_INC" || true

          # Python library file (libpythonX.Y.so or libpythonX.Y.a)
          PY_LIBDIR=$(python3 -c "import sysconfig; print(sysconfig.get_config_var('LIBDIR') or sysconfig.get_config_var('libdir'))")
          PY_LDB=$(python3 -c "import sysconfig; ld=sysconfig.get_config_var('LDLIBRARY'); print(ld if ld is not None else '')")
          if [ -n "$PY_LDB" ]; then
            PY_LIB="$PY_LIBDIR/$PY_LDB"
          else
            # fallback: try to find libpython*.so in libdir
            PY_LIB=$(ls "$PY_LIBDIR"/libpython* 2>/dev/null | head -n 1 || true)
          fi
          echo "Candidate Python library: $PY_LIB"
          [ -f "$PY_LIB" ] || echo "WARNING: python library file not found at $PY_LIB (may still be ok if FindPython uses embed info)"

          # Show installed Python + numpy versions
          python3 -c "import sys, numpy as np; print('pyver=', sys.version.split()[0], 'numpy=', np.__version__)"

          # Show where vcpkg toolchain is
          echo "VCPKG toolchain: ${{ env.VCPKG_DIR }}/scripts/buildsystems/vcpkg.cmake"
          file "${{ env.VCPKG_DIR }}/scripts/buildsystems/vcpkg.cmake" || true

          # Run cmake with explicit Python variables (these are the usual FindPython cache variables)
          cmake -S cpp -B "${BUILD_DIR}" \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_TOOLCHAIN_FILE=${{ env.VCPKG_DIR }}/scripts/buildsystems/vcpkg.cmake \
            -DVCPKG_TARGET_TRIPLET=${{ env.VCPKG_TRIPLET }} \
            -DPython_EXECUTABLE="$PY" \
            -DPython_ROOT_DIR="$(dirname $(dirname "$PY"))" \
            -DPython_INCLUDE_DIR="$PY_INC" \
            -DPython_LIBRARY="$PY_LIB" \
            -DPython_NumPy_INCLUDE_DIRS="$PY_NUMPY_INC" \
            -D CMAKE_EXPORT_COMPILE_COMMANDS=ON \
            -DPython_FIND_REGISTRY=NEVER \
            -DPython_FIND_IMPLEMENTATIONS=CPython \
            -DPython_FIND_STRATEGY=LOCATION

      - name: Build project with CMake
        run: |
          cmake --build "${BUILD_DIR}" --config Release -- -j$(nproc)

      - name: Generate pyi stubs (if script exists)
        run: |
          if [ -x "./generate_stubs.sh" ]; then
            export BUILD_DIR=${BUILD_DIR}
            export STUB_OUT=${{ github.workspace }}/cpp/stubs
            mkdir -p "$STUB_OUT"
            bash ./generate_stubs.sh
          else
            echo "No generate_stubs.sh found — skipping stubs generation"
          fi

      - name: List build outputs (debug)
        run: |
          echo "Contents of build dir:"
          ls -la "${BUILD_DIR}" || true
          echo "Contents of cpp:"
          ls -la cpp || true

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: cpp-build
          path: |
            ${{ github.workspace }}/cpp/build
            ${{ github.workspace }}/cpp/stubs
