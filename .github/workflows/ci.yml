name: Build C++ Module (vcpkg)

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      VCPKG_DIR: ${{ github.workspace }}/vcpkg
      VCPKG_TRIPLET: x64-linux
      BUILD_DIR: ${{ github.workspace }}/cpp/build

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system packages (build tools)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential cmake ninja-build git wget unzip \
            python3-dev python3-pip python3-venv \
            libopenblas-dev liblapack-dev

      - name: Install python tools (pip)
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install pybind11 pybind11-stubgen numpy

      - name: Install vcpkg
        run: |
          git clone --depth 1 https://github.com/microsoft/vcpkg.git "${VCPKG_DIR}"
          cd "${VCPKG_DIR}"
          ./bootstrap-vcpkg.sh

      - name: Install vcpkg dependencies (if vcpkg.json present)
        run: |
          if [ -f "${{ github.workspace }}/vcpkg.json" ]; then
            (cd "${{ github.workspace }}" && "${VCPKG_DIR}/vcpkg" install --triplet ${VCPKG_TRIPLET})
          elif [ -f "${{ github.workspace }}/cpp/vcpkg.json" ]; then
            (cd "${{ github.workspace }}/cpp" && "${VCPKG_DIR}/vcpkg" install --triplet ${VCPKG_TRIPLET})
          else
            echo "No vcpkg.json found — skipping vcpkg install"
          fi

      - name: Configure CMake (with vcpkg toolchain)
        run: |
          set -euo pipefail
          mkdir -p "${BUILD_DIR}"
          PY=$(python3 -c "import sys; print(sys.executable)")
          PY_INC=$(python3 -c "import sysconfig; print(sysconfig.get_paths()['include'])")
          PY_NUMPY_INC=$(python3 -c "import numpy as np; print(np.get_include())")
          echo "Python: $PY"
          echo "Python include: $PY_INC"
          echo "NumPy include: $PY_NUMPY_INC"

          cmake -S cpp -B "${BUILD_DIR}" \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_TOOLCHAIN_FILE=${VCPKG_DIR}/scripts/buildsystems/vcpkg.cmake \
            -DVCPKG_TARGET_TRIPLET=${VCPKG_TRIPLET} \
            -DPython_EXECUTABLE="$PY" \
            -DPython_INCLUDE_DIR="$PY_INC" \
            -DPython_NumPy_INCLUDE_DIRS="$PY_NUMPY_INC" \
            -DPython_FIND_REGISTRY=NEVER \
            -DPython_FIND_IMPLEMENTATIONS=CPython \
            -DPython_FIND_STRATEGY=LOCATION

      - name: Build project
        run: |
          cmake --build "${BUILD_DIR}" --config Release -- -j$(nproc)

      - name: Generate pyi stubs (optional)
        run: |
          if [ -x "./generate_stubs.sh" ]; then
            export BUILD_DIR=${BUILD_DIR}
            export STUB_OUT=${{ github.workspace }}/cpp/stubs
            mkdir -p "$STUB_OUT"
            bash ./generate_stubs.sh
          else
            echo "No generate_stubs.sh found — skipping stubs generation"
          fi

      - name: List outputs (debug)
        run: |
          echo "Contents of build dir:"
          ls -la "${BUILD_DIR}" || true
          echo "Contents of cpp:"
          ls -la cpp || true

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: cpp-build
          path: |
            ${{ github.workspace }}/cpp/build
            ${{ github.workspace }}/cpp/stubs
